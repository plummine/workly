  <!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Workly Task Zone</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00d4ff; --bg: #0d0d0d; --card: #161616; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* ফ্লোটিং এন্ট্রান্স স্ক্রিন */
        #welcomeScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a1a 0%, #0d0d0d 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000;
        }
        .float-btn {
            background: var(--primary); color: #000; padding: 20px 40px;
            border-radius: 50px; font-weight: bold; font-size: 18px;
            border: none; cursor: pointer; box-shadow: 0 0 20px var(--primary);
            animation: floating 2s infinite ease-in-out;
        }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* ড্যাশবোর্ড ডিজাইন */
        #mainDashboard { display: none; padding: 15px; opacity: 0; transition: 0.5s; }
        .container { max-width: 500px; margin: auto; }
        .ad-alert { background: rgba(255, 50, 50, 0.1); border: 1px solid #ff3232; padding: 10px; border-radius: 12px; margin-bottom: 20px; font-size: 12px; color: #ffcccc; text-align: center; }
        .tabs { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-bottom: 25px; }
        .tab { background: var(--card); padding: 12px 5px; border-radius: 15px; text-align: center; border: 1px solid #333; cursor: pointer; }
        .tab.active { border-color: var(--primary); background: rgba(0, 212, 255, 0.1); }
        .task-list { background: var(--card); border-radius: 20px; padding: 18px; border: 1px solid #222; }
        .task-card { background: #1f1f1f; margin-bottom: 12px; padding: 15px; border-radius: 15px; border-left: 4px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        .btn-start { background: var(--primary); color: #000; padding: 10px 20px; border-radius: 10px; font-weight: bold; font-size: 12px; border: none; cursor: pointer; }
        .badge-pending { background: #443a00; color: #ffcc00; padding: 6px 12px; border-radius: 8px; font-size: 10px; font-weight: bold; }

        /* পপআপ ও টাইমার */
        #taskModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: flex-start; padding-top: 50px; overflow-y: auto; }
        .modal-content { background: var(--card); width: 90%; max-width: 380px; border-radius: 25px; padding: 25px; border: 1px solid #333; text-align: center; }
        .timer-circle { width: 60px; height: 60px; border: 3px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; font-size: 20px; font-weight: bold; color: var(--primary); }
        #imgPreview { width: 100px; height: 100px; object-fit: cover; margin: 15px auto; border-radius: 10px; display: none; border: 2px solid var(--primary); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="welcomeScreen">
    <button class="float-btn" onclick="enterDashboard()">
        <i class="fas fa-bolt"></i> কাজ শুরু করুন
    </button>
</div>

<div id="mainDashboard">
    <div class="container">
        <h3 style="text-align: center; color: var(--primary);">Workly Mini App</h3>
        <div class="ad-alert">নির্দেশনা: Ad-Blocker বন্ধ রাখুন।</div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('ad')"><span>অ্যাড</span></div>
            <div class="tab" onclick="switchTab('soc')"><span>সোশ্যাল</span></div>
            <div class="tab"><span>রেজি:</span></div>
            <div class="tab"><span>অ্যাপ</span></div>
        </div>
        <div class="task-list" id="tasksContainer"></div>
    </div>
</div>

<div id="taskModal">
    <div class="modal-content">
        <h3 id="modalTitle" style="color:var(--primary); margin-bottom:15px;">টাস্ক লোড হচ্ছে</h3>
        <a href="#" id="adLink" target="_blank" class="btn-start" style="display:inline-block; padding: 15px 30px;" onclick="startTimer()">লিংকে প্রবেশ করুন</a>
        <div id="timerArea" class="hidden"><div class="timer-circle" id="seconds">15</div><p>অপেক্ষা করুন...</p></div>
        <div id="uploadArea" class="hidden">
            <form id="proofForm">
                <input type="file" id="fileInput" accept="image/*" class="hidden" required>
                <label for="fileInput" style="background:#1a1a1a; padding:20px; display:block; border-radius:15px; border:2px dashed #444; margin-bottom:10px;">স্ক্রিনশট আপলোড</label>
                <img id="imgPreview">
                <button type="submit" class="btn-start" style="width:100%; padding:15px;" id="submitBtn">সাবমিট করুন</button>
            </form>
        </div>
        <p onclick="location.reload()" style="color:#555; margin-top:20px; cursor:pointer;">বন্ধ করুন</p>
    </div>
</div>

<script>
    // টেলিগ্রাম থেকে অটোমেটিক ইউজার আইডি সংগ্রহ
    const tg = window.Telegram.WebApp;
    tg.expand(); // মিনি অ্যাপটি ফুল স্ক্রিন করবে
    
    // টেলিগ্রাম আইডি না পাওয়া গেলে লিঙ্কের আইডি খুঁজবে (ব্যাকআপ)
    const urlParams = new URLSearchParams(window.location.search);
    const uID = tg.initDataUnsafe.user?.id || urlParams.get('user_id') || '0';

    let currentTab = 'ad';

    function enterDashboard() {
        document.getElementById('welcomeScreen').style.display = 'none';
        document.getElementById('mainDashboard').style.display = 'block';
        setTimeout(() => { document.getElementById('mainDashboard').style.opacity = '1'; }, 50);
        renderTasks();
    }

    async function renderTasks() {
        const container = document.getElementById('tasksContainer');
        container.innerHTML = '<p style="text-align:center;">লোড হচ্ছে...</p>';
        try {
            const res = await fetch(`https://workly.rf.gd/get_status.php?user_id=${uID}`);
            const doneTasks = await res.json();
            container.innerHTML = '';
            
            const limit = currentTab === 'ad' ? 20 : 10;
            const prefix = currentTab === 'ad' ? 'ad_' : 'soc_';

            for(let i=1; i<=limit; i++){
                const tid = prefix + i;
                const isDone = doneTasks.includes(tid);
                const div = document.createElement('div');
                div.className = 'task-card';
                div.innerHTML = `<div><h4>কাজ #${i}</h4><p>৳ ${currentTab==='ad'?'0.20':'0.50'}</p></div>
                    ${isDone ? '<span class="badge-pending">পেন্ডিং</span>' : `<button class="btn-start" onclick="openWork('${tid}')">স্টার্ট</button>`}`;
                container.appendChild(div);
            }
        } catch (e) { container.innerHTML = 'সার্ভার এরর!'; }
    }

    function openWork(id) {
        document.getElementById('taskModal').style.display = 'flex';
        // এখানে আপনার লিঙ্ক সেট করুন
    }

    function startTimer() {
        document.getElementById('adLink').classList.add('hidden');
        document.getElementById('timerArea').classList.remove('hidden');
        let t = 15;
        const intr = setInterval(() => {
            t--; document.getElementById('seconds').innerText = t;
            if(t<=0){ 
                clearInterval(intr);
                document.getElementById('timerArea').classList.add('hidden');
                document.getElementById('uploadArea').classList.remove('hidden');
            }
        }, 1000);
    }

    document.getElementById('fileInput').onchange = function() {
        const preview = document.getElementById('imgPreview');
        preview.src = URL.createObjectURL(this.files[0]);
        preview.style.display = 'block';
        document.getElementById('submitBtn').scrollIntoView({behavior:'smooth'});
    }

    document.getElementById('proofForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerText = "জমা হচ্ছে..."; btn.disabled = true;
        const fd = new FormData();
        fd.append('user_id', uID);
        fd.append('task_id', 'ad_1'); // ডাইনামিক আইডি
        fd.append('screenshot', document.getElementById('fileInput').files[0]);
        try {
            const res = await fetch('https://workly.rf.gd/upload_handler.php', {method:'POST', body:fd});
            const data = await res.json();
            alert(data.message);
            location.reload();
        } catch(e) { alert("ব্যর্থ হয়েছে!"); btn.disabled = false; }
    }
</script>
</body>
</html>
