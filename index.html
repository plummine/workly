<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workly Task Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00d4ff; --bg: #0d0d0d; --card: #161616; --gold: #ffd700; --red: #ff4757; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; box-sizing: border-box; overflow-x: hidden; }
        .container { width: 100%; max-width: 450px; margin: auto; }
        
        .notice-board { background: rgba(255, 71, 87, 0.15); border: 2px solid var(--red); padding: 25px; border-radius: 15px; margin-bottom: 20px; text-align: center; }
        .notice-board p { margin: 0; color: #fff; font-size: 18px; font-weight: bold; line-height: 1.6; }

        #lock-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .lock-card { background: var(--card); border: 2px solid var(--primary); padding: 30px; border-radius: 25px; text-align: center; width: 100%; }
        .lock-card h2 { font-size: 24px; margin-bottom: 15px; color: var(--primary); }
        .lock-card p { font-size: 14px; color: #ccc; margin-bottom: 25px; }

        .join-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 20px; margin-bottom: 15px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 20px; border: none; cursor: pointer; color: white; }
        .btn-channel { background: #24A1DE; }
        .btn-verify { background: var(--primary); color: #000; }

        .header-card h2 { text-align: center; color: var(--primary); margin: 10px 0 20px; font-size: 28px; text-transform: uppercase; }

        .tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .tab-btn { background: var(--card); padding: 18px; border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid #333; font-size: 18px; font-weight: bold; color: #fff; }
        .tab-btn.active { border-color: var(--primary); background: rgba(0, 212, 255, 0.1); color: var(--primary); }

        .task-list { background: var(--card); border-radius: 15px; padding: 10px; border: 1px solid #222; }
        .task-row { background: #1f1f1f; margin-bottom: 15px; padding: 22px; border-radius: 12px; border-left: 6px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        .t-info h4 { margin: 0; font-size: 18px; color: #eee; }
        .t-info p { margin: 5px 0 0; font-size: 16px; color: var(--gold); font-weight: bold; }
        
        .btn-start { background: var(--primary); color: #000; padding: 15px 30px; border-radius: 10px; font-weight: bold; font-size: 16px; border: none; cursor: pointer; }
        .btn-start:disabled { background: #444; color: #888; cursor: not-allowed; }
        
        .hidden { display: none; }
        #timer-overlay { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 85%; background: rgba(22, 22, 22, 0.98); z-index: 999999; padding: 25px; border-radius: 20px; border: 2px solid var(--primary); text-align: center; }
        .timer-circle { width: 60px; height: 60px; border: 5px solid #333; border-top: 5px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; margin: 15px auto; }
    </style>
</head>
<body>

<div id="lock-screen">
    <div class="lock-card">
        <i class="fab fa-telegram" style="font-size: 70px; color: var(--primary); margin-bottom: 20px;"></i>
        <h2>চ্যানেলে জয়েন করুন</h2>
        <p>কাজ শুরু করার জন্য অবশ্যই আমাদের অফিসিয়াল টেলিগ্রাম চ্যানেলে জয়েন থাকতে হবে।</p>
        <button onclick="openChannel()" class="join-btn btn-channel">সাপোর্ট চ্যানেলে জয়েন</button>
        <button onclick="checkMembership()" class="join-btn btn-verify" id="vBtn">ভেরিফাই এবং আনলক</button>
    </div>
</div>

<div id="timer-overlay">
    <div id="display-task-id" style="color:var(--gold); font-size: 18px; font-weight:bold;">Task Name</div>
    <div class="timer-circle" id="timer-count">15</div>
</div>

<div class="container">
    <div class="header-card"><h2>Workly Task Pro</h2></div>
    
    <div class="notice-board">
        <p>নির্দেশনা: VPN ব্যবহার সম্পূর্ণ নিষেধ। প্রতিটি টাস্ক দিনে ২ বার করতে পারবেন। সঠিক কাজ না করলে পেমেন্ট পাবেন না।</p>
    </div>

    <div class="tabs">
        <div class="tab-btn active" id="tab-ads" onclick="switchTab('ads')">অ্যাড ক্লিক (২০)</div>
        <div class="tab-btn" id="tab-social" onclick="switchTab('social')">সাবস্ক্রাইব (১২)</div>
    </div>

    <div id="ads-section"><div class="task-list" id="ads-container"></div></div>
    <div id="social-section" class="hidden"><div class="task-list" id="social-container"></div></div>
</div>

<script>
    const webapp = window.Telegram.WebApp;
    const botToken = '8703552837:AAGGe0bJ9uJQaYK1BKJCcZUhdvs2cFJ1dBg';
    const chatId = '@WorklySupportChannel'; 
    const userId = webapp.initDataUnsafe.user?.id;

    webapp.ready();
    webapp.expand();

    async function checkMembership() {
        if(!userId) { bypassVerify(); return; }
        const vBtn = document.getElementById('vBtn');
        vBtn.innerText = "চেক করা হচ্ছে...";
        vBtn.disabled = true;

        try {
            const response = await fetch(`https://api.telegram.org/bot${botToken}/getChatMember?chat_id=${chatId}&user_id=${userId}`);
            const data = await response.json();
            if (data.ok && (data.result.status === 'member' || data.result.status === 'administrator' || data.result.status === 'creator')) {
                bypassVerify();
            } else {
                webapp.showAlert("আপনি চ্যানেলে জয়েন করেননি!");
                vBtn.innerText = "ভেরিফাই এবং আনলক";
                vBtn.disabled = false;
            }
        } catch (e) {
            bypassVerify(); // সার্ভার এরর হলে ইউজারকে ঢুকতে দেওয়া হবে
        }
    }

    function bypassVerify() {
        localStorage.setItem('workly_verified', 'true');
        document.getElementById('lock-screen').style.display = 'none';
    }

    function openChannel() { webapp.openTelegramLink('https://t.me/WorklySupportChannel'); }

    // ২০টি অ্যাড ক্লিক টাস্ক (আপনার ফাইল থেকে নেওয়া লিংকসমূহ)
    const adsTasks = [
        { id: 'ads_1', name: 'অ্যাড ক্লিক #১', url: 'https://freeshort.info/YV5Oqn', reward: '০.২০' },
        { id: 'ads_2', name: 'অ্যাড ক্লিক #২', url: 'https://freeshort.info/a2UERh', reward: '০.২০' },
        { id: 'ads_3', name: 'অ্যাড ক্লিক #৩', url: 'https://freeshort.info/JexUo0', reward: '০.২০' },
        { id: 'ads_4', name: 'অ্যাড ক্লিক #৪', url: 'https://freeshort.info/RkAWLv', reward: '০.২০' },
        { id: 'ads_5', name: 'অ্যাড ক্লিক #৫', url: 'https://freeshort.info/i6N4oj', reward: '০.২০' },
        { id: 'ads_6', name: 'অ্যাড ক্লিক #৬', url: 'https://freeshort.info/HDClK0', reward: '০.২০' },
        { id: 'ads_7', name: 'অ্যাড ক্লিক #৭', url: 'https://freeshort.info/esqIC1', reward: '০.২০' },
        { id: 'ads_8', name: 'অ্যাড ক্লিক #৮', url: 'https://freeshort.info/rTT7MV', reward: '০.২০' },
        { id: 'ads_9', name: 'অ্যাড ক্লিক #৯', url: 'https://freeshort.info/L3yxE0', reward: '০.২০' },
        { id: 'ads_10', name: 'অ্যাড ক্লিক #১০', url: 'https://freeshort.info/7rRj5U', reward: '০.২০' },
        { id: 'ads_11', name: 'অ্যাড ক্লিক #১১', url: 'https://freeshort.info/SSIFOI', reward: '০.২০' },
        { id: 'ads_12', name: 'অ্যাড ক্লিক #১২', url: 'https://freeshort.info/arRy2V', reward: '০.২০' },
        { id: 'ads_13', name: 'অ্যাড ক্লিক #১৩', url: 'https://freeshort.info/DrdvZN', reward: '০.২০' },
        { id: 'ads_14', name: 'অ্যাড ক্লিক #১৪', url: 'https://freeshort.info/eYanrA', reward: '০.২০' },
        { id: 'ads_15', name: 'অ্যাড ক্লিক #১৫', url: 'https://freeshort.info/4G5FY4', reward: '০.২০' },
        { id: 'ads_16', name: 'অ্যাড ক্লিক #১৬', url: 'https://freeshort.info/VhzfEu', reward: '০.২০' },
        { id: 'ads_17', name: 'অ্যাড ক্লিক #১৭', url: 'https://freeshort.info/rTT7MV', reward: '০.২০' },
        { id: 'ads_18', name: 'অ্যাড ক্লিক #১৮', url: 'https://freeshort.info/e2jBxF', reward: '০.২০' },
        { id: 'ads_19', name: 'অ্যাড ক্লিক #১৯', url: 'https://freeshort.info/7n9DG6', reward: '০.২০' },
        { id: 'ads_20', name: 'অ্যাড ক্লিক #২০', url: 'https://freeshort.info/tYTjo1', reward: '০.২০' }
    ];

    // ১২টি সোশ্যাল মিডিয়া টাস্ক (এখানে লিংক দিন)
    const socialTasks = [
        { id: 'soc_1', name: 'সাবস্ক্রাইব #১', url: '', reward: '০.৫০' },
        { id: 'soc_2', name: 'সাবস্ক্রাইব #২', url: '', reward: '০.৫০' },
        { id: 'soc_3', name: 'সাবস্ক্রাইব #৩', url: '', reward: '০.৫০' },
        { id: 'soc_4', name: 'সাবস্ক্রাইব #৪', url: '', reward: '০.৫০' },
        { id: 'soc_5', name: 'সাবস্ক্রাইব #৫', url: '', reward: '০.৫০' },
        { id: 'soc_6', name: 'সাবস্ক্রাইব #৬', url: '', reward: '০.৫০' },
        { id: 'soc_7', name: 'সাবস্ক্রাইব #৭', url: '', reward: '০.৫০' },
        { id: 'soc_8', name: 'সাবস্ক্রাইব #৮', url: '', reward: '০.৫০' },
        { id: 'soc_9', name: 'সাবস্ক্রাইব #৯', url: '', reward: '০.৫০' },
        { id: 'soc_10', name: 'সাবস্ক্রাইব #১০', url: '', reward: '০.৫০' },
        { id: 'soc_11', name: 'সাবস্ক্রাইব #১১', url: '', reward: '০.৫০' },
        { id: 'soc_12', name: 'সাবস্ক্রাইব #১২', url: '', reward: '০.৫০' }
    ];

    function renderTasks() {
        const render = (tasks, containerId) => {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            tasks.forEach(task => {
                let limit = JSON.parse(localStorage.getItem(task.id)) || { count: 0, lastTime: 0 };
                if (limit.lastTime && Date.now() - limit.lastTime > 86400000) {
                    limit = { count: 0, lastTime: 0 };
                    localStorage.setItem(task.id, JSON.stringify(limit));
                }
                const isLocked = limit.count >= 2;
                container.innerHTML += `
                    <div class="task-row">
                        <div class="t-info"><h4>${task.name}</h4><p>৳ ${task.reward}</p></div>
                        <button onclick="startTask('${task.url}', '${task.name}', '${task.id}')" 
                                class="btn-start" ${isLocked ? 'disabled' : ''}>
                            ${isLocked ? 'Locked' : 'স্টার্ট'}
                        </button>
                    </div>`;
            });
        };
        render(adsTasks, 'ads-container');
        render(socialTasks, 'social-container');
    }

    function startTask(url, name, id) {
        if(!url) return webapp.showAlert("লিংক নেই!");
        let limit = JSON.parse(localStorage.getItem(id)) || { count: 0, lastTime: 0 };
        if (limit.count >= 2) return;
        
        limit.count++;
        if (limit.count === 1) limit.lastTime = Date.now();
        localStorage.setItem(id, JSON.stringify(limit));
        
        document.getElementById('timer-overlay').style.display = 'block';
        document.getElementById('display-task-id').innerText = name;
        webapp.openLink(url);
        
        let t = 15;
        const intr = setInterval(() => {
            t--;
            document.getElementById('timer-count').innerText = t;
            if(t <= 0) { clearInterval(intr); document.getElementById('timer-overlay').style.display = 'none'; renderTasks(); }
        }, 1000);
    }

    function switchTab(type) {
        document.getElementById('ads-section').classList.toggle('hidden', type !== 'ads');
        document.getElementById('social-section').classList.toggle('hidden', type === 'ads');
        document.getElementById('tab-ads').classList.toggle('active', type === 'ads');
        document.getElementById('tab-social').classList.toggle('active', type !== 'ads');
    }

    window.onload = () => {
        if(localStorage.getItem('workly_verified') === 'true') document.getElementById('lock-screen').style.display = 'none';
        renderTasks();
    };
</script>
</body>
</html>
