<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Workly Task Zone</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00d4ff; --bg: #0d0d0d; --card: #161616; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* এন্ট্রান্স ফ্লোটিং বাটন স্ক্রিন */
        #welcomeScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a1a 0%, #080808 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000;
            transition: 0.6s ease-in-out;
        }
        .float-btn {
            background: var(--primary); color: #000; padding: 22px 45px;
            border-radius: 50px; font-weight: 800; font-size: 20px;
            border: none; cursor: pointer; box-shadow: 0 0 25px var(--primary);
            animation: floating 2s infinite ease-in-out; text-transform: uppercase;
        }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* মেইন ড্যাশবোর্ড */
        #mainDashboard { display: none; padding: 15px; opacity: 0; transition: 0.8s; }
        .container { max-width: 480px; margin: auto; }
        .header-box { text-align: center; margin-bottom: 20px; }
        .ad-alert { background: rgba(255, 50, 50, 0.1); border: 1px solid #ff3232; padding: 12px; border-radius: 12px; font-size: 12px; color: #ffcccc; margin-bottom: 15px; text-align: center; }

        /* ট্যাব সিস্টেম */
        .tabs { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .tab { background: var(--card); padding: 12px 5px; border-radius: 15px; text-align: center; border: 1px solid #333; cursor: pointer; transition: 0.3s; }
        .tab.active { border-color: var(--primary); background: rgba(0, 212, 255, 0.15); }
        .tab i { font-size: 18px; color: var(--primary); margin-bottom: 5px; display: block; }
        .tab span { font-size: 10px; font-weight: bold; }

        /* টাস্ক কার্ড */
        .task-list { background: var(--card); border-radius: 20px; padding: 15px; border: 1px solid #222; }
        .task-card { background: #1f1f1f; margin-bottom: 12px; padding: 15px; border-radius: 15px; border-left: 4px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        .task-card h4 { margin: 0; font-size: 14px; }
        .task-card p { margin: 5px 0 0; font-size: 12px; color: var(--primary); font-weight: bold; }

        .btn-start { background: var(--primary); color: #000; padding: 10px 18px; border-radius: 10px; font-weight: bold; font-size: 12px; border: none; cursor: pointer; text-decoration: none; }
        .badge-pending { background: #443a00; color: #ffcc00; padding: 8px 14px; border-radius: 8px; font-size: 11px; font-weight: bold; border: 1px solid #ffcc00; }

        /* Modal Design */
        #taskModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 3000; justify-content: center; align-items: flex-start; padding-top: 60px; overflow-y: auto; }
        .modal-content { background: var(--card); width: 88%; max-width: 380px; border-radius: 25px; padding: 25px; border: 1px solid #333; text-align: center; }
        .timer-circle { width: 70px; height: 70px; border: 4px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 24px; font-weight: bold; color: var(--primary); }
        
        #imgPreview { width: 110px; height: 110px; object-fit: cover; margin: 15px auto; border-radius: 12px; display: none; border: 2px solid var(--primary); }
        .upload-area { background: #1a1a1a; border: 2px dashed #444; border-radius: 15px; padding: 25px; cursor: pointer; margin-top: 15px; display: block; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="welcomeScreen">
    <button class="float-btn" onclick="enterDashboard()">
        <i class="fas fa-rocket"></i> কাজ শুরু করুন
    </button>
    <p style="color: #666; margin-top: 15px; font-size: 12px;">Workly - Earn with Tasks</p>
</div>

<div id="mainDashboard">
    <div class="container">
        <div class="header-box">
            <h2 style="color: var(--primary); margin: 0;">WORKLY</h2>
            <p style="font-size: 12px; color: #888;">৩০টি কাজ সম্পন্ন করুন</p>
        </div>

        <div class="ad-alert">
            <i class="fas fa-exclamation-triangle"></i> নির্দেশনা: লিঙ্কে ক্লিক করে ১৫ সেকেন্ড অপেক্ষা করতে হবে।
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('ad')"><i class="fas fa-mouse-pointer"></i><span>অ্যাড কাজ</span></div>
            <div class="tab" onclick="switchTab('soc')"><i class="fab fa-youtube"></i><span>সোশ্যাল</span></div>
            <div class="tab"><i>-</i><span>রেজি:</span></div>
            <div class="tab"><i>-</i><span>অ্যাপ</span></div>
        </div>

        <div class="task-list" id="tasksContainer">
            </div>
    </div>
</div>

<div id="taskModal">
    <div class="modal-content">
        <h3 id="modalTitle" style="color:var(--primary); font-size:18px; margin-bottom:15px;">টাস্ক লোড হচ্ছে...</h3>
        
        <a href="#" id="adLink" target="_blank" class="btn-start" style="display:inline-block; padding: 15px 35px;" onclick="startTimer()">লিংকে প্রবেশ করুন</a>
        
        <div id="timerArea" class="hidden">
            <div class="timer-circle" id="seconds">15</div>
            <p style="font-size:12px; color:#aaa;">পেজে ১৫ সেকেন্ড অবস্থান করুন</p>
        </div>

        <div id="uploadArea" class="hidden">
            <form id="proofForm">
                <label for="fileInput" class="upload-area">
                    <i class="fas fa-image" style="font-size:28px; color:var(--primary);"></i>
                    <p style="font-size:11px; color:#888; margin-top:8px;">কাজের স্ক্রিনশট আপলোড করুন</p>
                    <input type="file" id="fileInput" accept="image/*" class="hidden" required>
                </label>
                <img id="imgPreview">
                <button type="submit" class="btn-start" style="width:100%; margin-top:15px; padding:15px;" id="submitBtn">সাবমিট করুন</button>
            </form>
        </div>
        <p onclick="location.reload()" style="color:#666; font-size:11px; margin-top:20px; cursor:pointer;">বাতিল করুন</p>
    </div>
</div>

<script>
    // টেলিগ্রাম আইডি ডিটেকশন
    const tg = window.Telegram.WebApp;
    tg.expand();
    const uID = tg.initDataUnsafe.user?.id || new URLSearchParams(window.location.search).get('user_id') || '0';

    let currentTab = 'ad';

    // ৩০টি লিঙ্কের লিস্ট - এখানে তোমার লিঙ্কগুলো বসাও
    const taskLinks = {
        // ২০টি অ্যাড কাজ
        "ad_1": "এখানে ১ নম্বর অ্যাড লিঙ্ক বসান",
        "ad_2": "এখানে ২ নম্বর অ্যাড লিঙ্ক বসান",
        "ad_3": "এখানে ৩ নম্বর অ্যাড লিঙ্ক বসান",
        "ad_4": "এখানে ৪ নম্বর অ্যাড লিঙ্ক বসান",
        "ad_5": "এখানে ৫ নম্বর অ্যাড লিঙ্ক বসান",
        "ad_6": "এখানে ৬ নম্বর অ্যাড লিঙ্ক বসান",
        "ad_7": "এখানে ৭ নম্বর অ্যাড লিঙ্ক বসান",
        "ad_8": "এখানে ৮ নম্বর অ্যাড লিঙ্ক বসান",
        "ad_9": "এখানে ৯ নম্বর অ্যাড লিঙ্ক বসান",
        "ad_10": "এখানে ১০ নম্বর অ্যাড লিঙ্ক বসান",
        "ad_11": "এখানে ১১ নম্বর অ্যাড লিঙ্ক বসান",
        "ad_12": "এখানে ১২ নম্বর অ্যাড লিঙ্ক বসান",
        "ad_13": "এখানে ১৩ নম্বর অ্যাড লিঙ্ক বসান",
        "ad_14": "এখানে ১৪ নম্বর অ্যাড লিঙ্ক বসান",
        "ad_15": "এখানে ১৫ নম্বর অ্যাড লিঙ্ক বসান",
        "ad_16": "এখানে ১৬ নম্বর অ্যাড লিঙ্ক বসান",
        "ad_17": "এখানে ১৭ নম্বর অ্যাড লিঙ্ক বসান",
        "ad_18": "এখানে ১৮ নম্বর অ্যাড লিঙ্ক বসান",
        "ad_19": "এখানে ১৯ নম্বর অ্যাড লিঙ্ক বসান",
        "ad_20": "এখানে ২০ নম্বর অ্যাড লিঙ্ক বসান",

        // ১০টি সোশ্যাল কাজ (ইউটিউব/ফেসবুক)
        "soc_1": "এখানে ১ নম্বর সোশ্যাল লিঙ্ক বসান",
        "soc_2": "এখানে ২ নম্বর সোশ্যাল লিঙ্ক বসান",
        "soc_3": "এখানে ৩ নম্বর সোশ্যাল লিঙ্ক বসান",
        "soc_4": "এখানে ৪ নম্বর সোশ্যাল লিঙ্ক বসান",
        "soc_5": "এখানে ৫ নম্বর সোশ্যাল লিঙ্ক বসান",
        "soc_6": "এখানে ৬ নম্বর সোশ্যাল লিঙ্ক বসান",
        "soc_7": "এখানে ৭ নম্বর সোশ্যাল লিঙ্ক বসান",
        "soc_8": "এখানে ৮ নম্বর সোশ্যাল লিঙ্ক বসান",
        "soc_9": "এখানে ৯ নম্বর সোশ্যাল লিঙ্ক বসান",
        "soc_10": "এখানে ১০ নম্বর সোশ্যাল লিঙ্ক বসান"
    };

    function enterDashboard() {
        document.getElementById('welcomeScreen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('mainDashboard').style.display = 'block';
            setTimeout(() => { document.getElementById('mainDashboard').style.opacity = '1'; }, 50);
            renderTasks();
        }, 600);
    }

    function switchTab(t) {
        currentTab = t;
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
        renderTasks();
    }

    async function renderTasks() {
        const container = document.getElementById('tasksContainer');
        container.innerHTML = '<p style="text-align:center; padding:20px; font-size:12px;">চেক করা হচ্ছে...</p>';
        
        try {
            const response = await fetch(`https://workly.rf.gd/get_status.php?user_id=${uID}`);
            const doneTasks = await response.json();

            container.innerHTML = '';
            const limit = currentTab === 'ad' ? 20 : 10;
            const prefix = currentTab === 'ad' ? 'ad_' : 'soc_';
            const price = currentTab === 'ad' ? '0.20' : '0.50';

            for(let i=1; i<=limit; i++){
                const tid = prefix + i;
                const isDone = doneTasks.includes(tid);
                const card = document.createElement('div');
                card.className = 'task-card';
                card.innerHTML = `
                    <div><h4>${currentTab==='ad'?'অ্যাড ক্লিক':'সোশ্যাল কাজ'} #${i}</h4><p>৳ ${price}</p></div>
                    ${isDone ? '<span class="badge-pending">পেন্ডিং</span>' : `<button class="btn-start" onclick="openWork('${tid}')">স্টার্ট</button>`}
                `;
                container.appendChild(card);
            }
        } catch (e) {
            container.innerHTML = '<p style="text-align:center; color:red;">সার্ভার এরর!</p>';
        }
    }

    let activeTid = "";
    function openWork(id) {
        activeTid = id;
        document.getElementById('adLink').href = taskLinks[id] || "#";
        document.getElementById('modalTitle').innerText = (id.includes('ad') ? "অ্যাড ভিজিট করুন" : "চ্যানেল সাবস্ক্রাইব করুন");
        document.getElementById('taskModal').style.display = 'flex';
    }

    function startTimer() {
        document.getElementById('adLink').classList.add('hidden');
        document.getElementById('timerArea').classList.remove('hidden');
        let t = 15;
        const intr = setInterval(() => {
            t--;
            document.getElementById('seconds').innerText = t;
            if(t <= 0) {
                clearInterval(intr);
                document.getElementById('timerArea').classList.add('hidden');
                document.getElementById('uploadArea').classList.remove('hidden');
            }
        }, 1000);
    }

    document.getElementById('fileInput').onchange = function() {
        const preview = document.getElementById('imgPreview');
        preview.src = URL.createObjectURL(this.files[0]);
        preview.style.display = 'block';
        document.getElementById('submitBtn').scrollIntoView({behavior:'smooth'});
    }

    document.getElementById('proofForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerText = "প্রসেসিং..."; btn.disabled = true;

        const fd = new FormData();
        fd.append('user_id', uID);
        fd.append('task_id', activeTid);
        fd.append('screenshot', document.getElementById('fileInput').files[0]);

        try {
            const res = await fetch('https://workly.rf.gd/upload_handler.php', { method: 'POST', body: fd });
            const data = await res.json();
            alert(data.message);
            location.reload();
        } catch(err) {
            alert("সার্ভার এরর! আবার চেষ্টা করুন।");
            btn.disabled = false;
            btn.innerText = "সাবমিট করুন";
        }
    };
</script>
</body>
</html>
